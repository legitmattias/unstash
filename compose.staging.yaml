# Staging overrides — GHCR images tagged :staging, host ports 8010/3510 for same-host
# coexistence with production, lower resource limits.
# Secrets supplied by the host at $SECRETS_DIR; see ADR 0003.
#
# Usage (from CI):
#   DOCKER_HOST=ssh://... SECRETS_DIR=... docker compose -p unstash-staging \
#     -f compose.yaml -f compose.staging.yaml up -d

services:
  api:
    image: ${API_IMAGE:-ghcr.io/legitmattias/unstash-api}:${IMAGE_TAG:-staging}
    ports:
      - "127.0.0.1:8010:8000"
    secrets:
      - database_password
      - database_migrations_password
      - database_admin_password
      - session_secret
      - encryption_key
    environment:
      UNSTASH_ENVIRONMENT: staging
      UNSTASH_DEBUG: "false"
      UNSTASH_LOG_LEVEL: DEBUG
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.75"

  frontend:
    image: ${WEB_IMAGE:-ghcr.io/legitmattias/unstash-web}:${IMAGE_TAG:-staging}
    ports:
      - "127.0.0.1:3510:3000"
    environment:
      NODE_ENV: production
      ORIGIN: ${ORIGIN:?ORIGIN must be set (e.g., https://staging.example.com)}
      BODY_SIZE_LIMIT: "10M"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"

  worker:
    image: ${API_IMAGE:-ghcr.io/legitmattias/unstash-api}:${IMAGE_TAG:-staging}
    secrets:
      - database_password
      - database_migrations_password
      - database_admin_password
      - session_secret
      - encryption_key
    environment:
      UNSTASH_ENVIRONMENT: staging
      UNSTASH_DEBUG: "false"
      UNSTASH_LOG_LEVEL: DEBUG
    command: ["taskiq", "worker", "unstash.tasks:broker"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.75"

  postgres:
    image: ${POSTGRES_IMAGE:-ghcr.io/legitmattias/unstash-postgres}:${IMAGE_TAG:-staging}
    secrets:
      - database_password
      - database_migrations_password
      - database_admin_password
      - postgres_superuser_password
    environment:
      POSTGRES_DB: unstash
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

secrets:
  database_password:
    file: ${SECRETS_DIR:?SECRETS_DIR must point to the host directory holding the secret files}/database_password
  database_migrations_password:
    file: ${SECRETS_DIR}/database_migrations_password
  database_admin_password:
    file: ${SECRETS_DIR}/database_admin_password
  postgres_superuser_password:
    file: ${SECRETS_DIR}/postgres_superuser_password
  session_secret:
    file: ${SECRETS_DIR}/session_secret
  encryption_key:
    file: ${SECRETS_DIR}/encryption_key
