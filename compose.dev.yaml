# Development overrides — hot reload, exposed ports, debug logging.
#
# Usage: docker compose -f compose.yaml -f compose.dev.yaml up

services:
  api:
    build:
      target: dev
    volumes:
      - ./backend/src:/app/src:ro
    ports:
      - "127.0.0.1:8100:8000"
    environment:
      UNSTASH_ENVIRONMENT: development
      UNSTASH_DEBUG: "true"
      UNSTASH_LOG_LEVEL: DEBUG
    command: ["uv", "run", "uvicorn", "unstash.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      target: dev
    volumes:
      - ./frontend/src:/app/src:ro
    ports:
      - "127.0.0.1:5174:5173"
    environment:
      NODE_ENV: development
    command: ["pnpm", "run", "dev", "--host", "0.0.0.0"]

  postgres:
    ports:
      - "127.0.0.1:5434:5432"

  redis:
    ports:
      - "127.0.0.1:6380:6379"
