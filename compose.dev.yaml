# Development overrides — file-based secrets, hot reload, exposed ports.
#
# Usage: docker compose -f compose.yaml -f compose.dev.yaml up --build

services:
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: dev
    volumes:
      - ./backend/src:/app/src:ro
    ports:
      - "127.0.0.1:8100:8000"
    secrets:
      - database_password
      - session_secret
      - encryption_key
    environment:
      UNSTASH_ENVIRONMENT: development
      UNSTASH_DEBUG: "true"
      UNSTASH_LOG_LEVEL: DEBUG
    command: ["uv", "run", "uvicorn", "unstash.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: dev
    volumes:
      - ./frontend/src:/app/src:ro
    ports:
      - "127.0.0.1:5174:5173"
    environment:
      NODE_ENV: development
    command: ["pnpm", "run", "dev", "--host", "0.0.0.0"]

  postgres:
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    image: unstash-postgres:dev
    secrets:
      - database_password
      - database_migrations_password
      - postgres_superuser_password
    environment:
      POSTGRES_DB: unstash
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
    ports:
      - "127.0.0.1:5434:5432"

  redis:
    ports:
      - "127.0.0.1:6380:6379"

secrets:
  database_password:
    file: ./secrets/database_password.txt
  database_migrations_password:
    file: ./secrets/database_migrations_password.txt
  postgres_superuser_password:
    file: ./secrets/postgres_superuser_password.txt
  session_secret:
    file: ./secrets/session_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
