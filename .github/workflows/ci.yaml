name: CI

on:
  pull_request:
    branches: [development, main]
  workflow_call: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"
  UV_SYSTEM_PYTHON: 1

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint, type-check, test
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

  backend-typecheck:
    name: Backend type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen

      - name: Pyright
        run: uv run pyright src

  backend-test:
    name: Backend test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: uv sync --frozen

      - name: Pytest
        run: uv run pytest tests --ignore=tests/integration --cov-report=xml

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.xml

  # ---------------------------------------------------------------------------
  # Frontend: check, build
  # ---------------------------------------------------------------------------
  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Svelte check
        run: pnpm run check

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  # ---------------------------------------------------------------------------
  # Docker: validate compose and build images
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder secrets for config validation
        run: |
          mkdir -p secrets
          for f in database_password database_migrations_password database_admin_password postgres_superuser_password session_secret encryption_key; do
            echo "ci-placeholder" > "secrets/${f}.txt"
          done

      - name: Validate compose config
        env:
          ORIGIN: http://ci-validation.local
          SECRETS_DIR: /ci-validation/secrets
        run: |
          docker compose -f compose.yaml -f compose.dev.yaml config --quiet
          docker compose -f compose.yaml -f compose.staging.yaml config --quiet
          docker compose -f compose.yaml -f compose.production.yaml config --quiet

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile --target runtime -t unstash-api:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile --target runtime -t unstash-frontend:ci .

  # ---------------------------------------------------------------------------
  # Runtime smoke test: prove the runtime image can apply migrations end-to-end
  # against a fresh postgres bootstrapped by init-db.sh.
  # ---------------------------------------------------------------------------
  runtime-migration-smoke:
    name: Runtime migration smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build postgres image
        run: docker build -f docker/postgres.Dockerfile -t unstash-postgres:ci .

      - name: Build api runtime image
        run: docker build -f docker/backend.Dockerfile --target runtime -t unstash-api:ci .

      - name: Generate placeholder secrets
        run: |
          SECRETS_DIR=$(mktemp -d)
          echo "SECRETS_DIR=$SECRETS_DIR" >> "$GITHUB_ENV"
          for name in database_password database_migrations_password database_admin_password postgres_superuser_password session_secret encryption_key; do
            openssl rand -base64 32 | tr -d '\n' > "$SECRETS_DIR/$name"
          done
          ls -la "$SECRETS_DIR"

      - name: Bring up postgres + api
        run: |
          docker compose \
            -f compose.yaml -f compose.ci-smoke.yaml \
            -p unstash-ci-smoke \
            up -d postgres api

      - name: Wait for api to become healthy
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect unstash-ci-smoke-api-1 --format '{{.State.Health.Status}}' 2>/dev/null || echo "missing")
            echo "[attempt $i] api status: $status"
            if [ "$status" = "healthy" ]; then
              echo "::notice::api healthy — startup checks passed against runtime image + fresh postgres"
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "::error::api became unhealthy"
              break
            fi
            sleep 5
          done
          echo "::error::api did not become healthy within timeout"
          docker logs unstash-ci-smoke-api-1
          exit 1

      - name: Apply migrations via alembic
        run: |
          docker compose \
            -f compose.yaml -f compose.ci-smoke.yaml \
            -p unstash-ci-smoke \
            exec -T api alembic upgrade head

      - name: Verify alembic at head
        run: |
          output=$(docker compose \
            -f compose.yaml -f compose.ci-smoke.yaml \
            -p unstash-ci-smoke \
            exec -T api alembic current)
          echo "$output"
          if ! echo "$output" | grep -q '(head)'; then
            echo "::error::alembic current does not show (head)"
            exit 1
          fi

      - name: Verify schema has expected tables
        run: |
          count=$(docker compose \
            -f compose.yaml -f compose.ci-smoke.yaml \
            -p unstash-ci-smoke \
            exec -T postgres \
            psql -U unstash_migrations -d unstash -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'public'" | tr -d '[:space:]')
          echo "Schema table count: $count"
          if [ "$count" -lt 10 ]; then
            echo "::error::Expected at least 10 tables, got $count"
            exit 1
          fi

      - name: Verify startup_check log lines fired
        run: |
          logs=$(docker logs unstash-ci-smoke-api-1 2>&1)
          echo "$logs" | grep "startup_check_passed" || true
          for check in secrets_loadable not_superuser required_extensions; do
            if ! echo "$logs" | grep "startup_check_passed" | grep -q "$check"; then
              echo "::error::startup_check_passed log line not found for: $check"
              exit 1
            fi
          done
          echo "::notice::all three startup checks logged as passed"

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f compose.yaml -f compose.ci-smoke.yaml \
            -p unstash-ci-smoke \
            down -v || true

  # ---------------------------------------------------------------------------
  # Integration tests: pytest suite that uses testcontainers to spin up a real
  # postgres with init-db.sh and runs adversarial RLS + migration roundtrip
  # tests against it.
  # ---------------------------------------------------------------------------
  backend-integration-test:
    name: Backend integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build postgres image (required by testcontainers fixture)
        run: docker build -f docker/postgres.Dockerfile -t unstash-postgres:ci .

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen

      - name: Run integration tests
        working-directory: backend
        env:
          # HF_TOKEN lifts the HuggingFace Hub anonymous rate limit so
          # parallel test runs downloading the tokenizer don't hit 429.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run pytest tests/integration --no-cov

  # ---------------------------------------------------------------------------
  # Security: secrets scanning
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
