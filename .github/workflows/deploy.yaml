name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/legitmattias/unstash-api
  WEB_IMAGE: ghcr.io/legitmattias/unstash-web
  POSTGRES_IMAGE: ghcr.io/legitmattias/unstash-postgres

jobs:
  # ── Build and push Docker images to GHCR ─────────────────
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:staging
            ${{ env.API_IMAGE }}:production
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:staging
            ${{ env.WEB_IMAGE }}:production
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Build and push Postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/postgres.Dockerfile
          push: true
          tags: |
            ${{ env.POSTGRES_IMAGE }}:${{ github.sha }}
            ${{ env.POSTGRES_IMAGE }}:staging
            ${{ env.POSTGRES_IMAGE }}:production
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,scope=postgres,mode=max

  # ── Deploy to staging (auto on push to main) ─────────────
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          printf 'Host %s\n  IdentityFile %s\n' \
            "${{ secrets.DEPLOY_HOST }}" "$HOME/.ssh/deploy_key" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          POSTGRES_IMAGE: ${{ env.POSTGRES_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          ORIGIN: ${{ vars.ORIGIN }}
          UNSTASH_DATABASE_PASSWORD: ${{ secrets.UNSTASH_DATABASE_PASSWORD }}
          UNSTASH_SESSION_SECRET: ${{ secrets.UNSTASH_SESSION_SECRET }}
          UNSTASH_ENCRYPTION_KEY: ${{ secrets.UNSTASH_ENCRYPTION_KEY }}
          POSTGRES_MIGRATIONS_PASSWORD: ${{ secrets.POSTGRES_MIGRATIONS_PASSWORD }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -p unstash-staging -f compose.yaml -f compose.staging.yaml pull
          docker compose -p unstash-staging -f compose.yaml -f compose.staging.yaml up -d

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 10
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://localhost:8010/api/health || (echo "API health check failed" && exit 1)'
          echo "Staging deploy complete."

  # ── Deploy to production (manual, workflow_dispatch only) ─
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          printf 'Host %s\n  IdentityFile %s\n' \
            "${{ secrets.DEPLOY_HOST }}" "$HOME/.ssh/deploy_key" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          POSTGRES_IMAGE: ${{ env.POSTGRES_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          ORIGIN: ${{ vars.ORIGIN }}
          UNSTASH_DATABASE_PASSWORD: ${{ secrets.UNSTASH_DATABASE_PASSWORD }}
          UNSTASH_SESSION_SECRET: ${{ secrets.UNSTASH_SESSION_SECRET }}
          UNSTASH_ENCRYPTION_KEY: ${{ secrets.UNSTASH_ENCRYPTION_KEY }}
          POSTGRES_MIGRATIONS_PASSWORD: ${{ secrets.POSTGRES_MIGRATIONS_PASSWORD }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -p unstash-production -f compose.yaml -f compose.production.yaml pull
          docker compose -p unstash-production -f compose.yaml -f compose.production.yaml up -d

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 10
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://localhost:8000/api/health || (echo "API health check failed" && exit 1)'
          echo "Production deploy complete."
