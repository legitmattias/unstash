name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/legitmattias/unstash-api
  WEB_IMAGE: ghcr.io/legitmattias/unstash-web

jobs:
  # ── Build and push Docker images to GHCR ─────────────────
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  # ── Deploy to production ─────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          printf 'Host %s\n  IdentityFile %s\n' \
            "${{ secrets.DEPLOY_HOST }}" "$HOME/.ssh/deploy_key" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          # Images
          API_IMAGE: ${{ env.API_IMAGE }}
          WEB_IMAGE: ${{ env.WEB_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          # App config
          ORIGIN: ${{ vars.ORIGIN }}
          # Secrets (injected as env vars for Pydantic Settings)
          UNSTASH_DATABASE_PASSWORD: ${{ secrets.UNSTASH_DATABASE_PASSWORD }}
          UNSTASH_SESSION_SECRET: ${{ secrets.UNSTASH_SESSION_SECRET }}
          UNSTASH_ENCRYPTION_KEY: ${{ secrets.UNSTASH_ENCRYPTION_KEY }}
          POSTGRES_MIGRATIONS_PASSWORD: ${{ secrets.POSTGRES_MIGRATIONS_PASSWORD }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -p unstash -f compose.yaml -f compose.prod.yaml pull
          docker compose -p unstash -f compose.yaml -f compose.prod.yaml up -d

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 10
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://localhost:8000/api/health || (echo "API health check failed" && exit 1)'
          echo "Deploy complete."
