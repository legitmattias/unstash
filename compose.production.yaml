# Production overrides — GHCR images tagged :production, file-based secrets
# mounted from the VPS filesystem, resource limits, restart policies.
#
# Secrets live at /opt/unstash/secrets/production/ on the VPS, owned by the
# deploy user with restrictive directory permissions. CI never sees these
# values — it only builds images and runs `docker compose up` on the remote
# daemon, which bind-mounts the files into containers at /run/secrets/<name>.
#
# Usage (from CI):
#   DOCKER_HOST=ssh://... docker compose -p unstash-production \
#     -f compose.yaml -f compose.production.yaml up -d

services:
  api:
    image: ${API_IMAGE:-ghcr.io/legitmattias/unstash-api}:${IMAGE_TAG:-production}
    ports:
      - "127.0.0.1:8000:8000"
    secrets:
      - database_password
      - session_secret
      - encryption_key
    environment:
      UNSTASH_ENVIRONMENT: production
      UNSTASH_DEBUG: "false"
      UNSTASH_LOG_LEVEL: INFO
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    image: ${WEB_IMAGE:-ghcr.io/legitmattias/unstash-web}:${IMAGE_TAG:-production}
    ports:
      - "127.0.0.1:3500:3000"
    environment:
      NODE_ENV: production
      ORIGIN: ${ORIGIN:-https://unstash.mattic.dev}
      BODY_SIZE_LIMIT: "10M"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    image: ${POSTGRES_IMAGE:-ghcr.io/legitmattias/unstash-postgres}:${IMAGE_TAG:-production}
    secrets:
      - database_password
      - database_migrations_password
    environment:
      POSTGRES_DB: unstash
      POSTGRES_USER: unstash_migrations
      POSTGRES_PASSWORD_FILE: /run/secrets/database_migrations_password
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

secrets:
  database_password:
    file: /opt/unstash/secrets/production/database_password
  database_migrations_password:
    file: /opt/unstash/secrets/production/database_migrations_password
  session_secret:
    file: /opt/unstash/secrets/production/session_secret
  encryption_key:
    file: /opt/unstash/secrets/production/encryption_key
