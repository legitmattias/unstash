# Production overrides — GHCR images tagged :production, env var secrets
# (injected by CI), resource limits, restart policies.
#
# Usage (from CI):
#   DOCKER_HOST=ssh://... docker compose -p unstash-production \
#     -f compose.yaml -f compose.production.yaml up -d

services:
  api:
    image: ${API_IMAGE:-ghcr.io/legitmattias/unstash-api}:${IMAGE_TAG:-production}
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      UNSTASH_ENVIRONMENT: production
      UNSTASH_DEBUG: "false"
      UNSTASH_LOG_LEVEL: INFO
      UNSTASH_DATABASE_PASSWORD: ${UNSTASH_DATABASE_PASSWORD}
      UNSTASH_SESSION_SECRET: ${UNSTASH_SESSION_SECRET}
      UNSTASH_ENCRYPTION_KEY: ${UNSTASH_ENCRYPTION_KEY}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  frontend:
    image: ${WEB_IMAGE:-ghcr.io/legitmattias/unstash-web}:${IMAGE_TAG:-production}
    ports:
      - "127.0.0.1:3500:3000"
    environment:
      NODE_ENV: production
      ORIGIN: ${ORIGIN:-https://unstash.mattic.dev}
      BODY_SIZE_LIMIT: "10M"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    image: ${POSTGRES_IMAGE:-ghcr.io/legitmattias/unstash-postgres}:${IMAGE_TAG:-production}
    environment:
      POSTGRES_DB: unstash
      POSTGRES_USER: unstash_migrations
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATIONS_PASSWORD}
      UNSTASH_APP_DB_PASSWORD: ${UNSTASH_DATABASE_PASSWORD}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
