# Base Docker Compose configuration for Unstash.
# Use with an override file:
#   Dev:  docker compose -f compose.yaml -f compose.dev.yaml up
#   Prod: docker compose -f compose.yaml -f compose.prod.yaml up -d

name: unstash

services:
  api:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 3
    environment:
      UNSTASH_DATABASE_HOST: postgres
      UNSTASH_DATABASE_PORT: "5432"
      UNSTASH_DATABASE_NAME: unstash
      UNSTASH_DATABASE_USER: unstash_app
      UNSTASH_REDIS_HOST: redis
      UNSTASH_REDIS_PORT: "6379"
    networks:
      - internal

  frontend:
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:17
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unstash_migrations -d unstash"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  pgdata:
  redisdata:

networks:
  internal:
    driver: bridge
